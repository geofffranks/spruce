on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-release-artifacts:
    name: build-release-artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - goos: linux
          goarch: amd64
        - goos: linux
          goarch: arm64
        - goos: windows
          goarch: amd64
        - goos: darwin
          goarch: amd64
        - goos: darwin
          goarch: arm64

    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        check-latest: true

    - name: Build
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: 'go build -v -o spruce-${{ matrix.goos }}-${{ matrix.goarch }} -ldflags="-X main.Version=${{ github.event.release.tag_name }}" ./cmd/spruce'

    - uses: geofffranks/upload-asset@v2
      with:
        file: ./spruce-${{ matrix.goos }}-${{ matrix.goarch }}
        with_sha1: true

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  annotate-go-version:
    name: annotate-go-version
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        check-latest: true

    - name: Capture resolved Go version
      id: gover
      run: echo "version=$(go env GOVERSION)" >> "$GITHUB_OUTPUT"

    - name: Append Go version to release notes (idempotent)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.event.release.tag_name }}
        GOVER: ${{ steps.gover.outputs.version }}
      run: |
        BODY=$(gh release view "$TAG" --json body -q .body)
        MARKER='<!-- go-version-footer -->'
        if printf '%s' "$BODY" | grep -qF "$MARKER"; then
          echo "Go version footer already present; skipping."
          exit 0
        fi
        FOOTER=$(printf '\n\n---\n%s\n_Binaries built with %s._' "$MARKER" "$GOVER")
        gh release edit "$TAG" --notes "$BODY$FOOTER"
